spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: portal-login-redirect
          uri: no://op
          predicates:
            - Path=/
          filters:
            - RedirectTo=302, http://localhost:5173/login
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**,/sso/**
        - id: facility-service
          uri: lb://FACILITY-SERVICE
          predicates:
            - Path=/api/facilities/**

jwt:
  public-key-path: classpath:rsa/publicKey.rsa
