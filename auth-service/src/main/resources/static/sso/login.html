<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SSO Login</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --card: #ffffff;
        --text: #10233f;
        --muted: #5b6b84;
        --primary: #1e6ee6;
        --primary-dark: #1658ba;
        --border: #dce5f2;
        --danger: #bf2d2d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(
          circle at top right,
          #d9e9ff,
          var(--bg) 50%
        );
        color: var(--text);
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 16px;
      }

      .card {
        width: 100%;
        max-width: 420px;
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 24px;
        box-shadow: 0 12px 32px rgba(22, 66, 136, 0.12);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 26px;
      }

      .subtitle {
        margin: 0 0 20px;
        color: var(--muted);
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
      }

      input[type="text"],
      input[type="password"] {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 11px 12px;
        margin-bottom: 14px;
        font-size: 15px;
      }

      .remember {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
      }

      button {
        width: 100%;
        border: 0;
        border-radius: 10px;
        padding: 12px;
        background: var(--primary);
        color: #fff;
        font-weight: 700;
        font-size: 15px;
        cursor: pointer;
      }

      button:hover {
        background: var(--primary-dark);
      }

      .message {
        min-height: 22px;
        margin: 0 0 12px;
        color: var(--danger);
      }

      .footer {
        margin-top: 16px;
        text-align: center;
      }

      .footer a {
        color: var(--primary);
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Đăng nhập SSO</h1>
      <p class="subtitle">Đăng nhập tập trung tại auth-service.</p>

      <p id="message" class="message"></p>

      <form id="loginForm">
        <label for="username">Tên đăng nhập</label>
        <input id="username" name="username" type="text" required />

        <label for="password">Mật khẩu</label>
        <input id="password" name="password" type="password" required />

        <label class="remember" for="rememberMe">
          <input id="rememberMe" name="rememberMe" type="checkbox" />
          Ghi nhớ đăng nhập
        </label>

        <button type="submit">Đăng nhập</button>
      </form>

      <div class="footer">
        Chưa có tài khoản? <a id="registerLink" href="/sso/register">Đăng ký</a>
      </div>
    </main>

    <script>
      (function () {
        const query = new URLSearchParams(window.location.search);
        const redirectUri =
          query.get("redirect_uri") || "http://localhost:5173/sso/callback";
        const state = query.get("state") || "/";
        const registerLink = document.getElementById("registerLink");
        const messageEl = document.getElementById("message");

        registerLink.href =
          "/sso/register?" +
          new URLSearchParams({
            redirect_uri: redirectUri,
            state,
          }).toString();

        const buildCallbackUrl = (payload) => {
          const callback = new URL(redirectUri);
          callback.hash = new URLSearchParams(payload).toString();
          return callback.toString();
        };

        document
          .getElementById("loginForm")
          .addEventListener("submit", async (event) => {
            event.preventDefault();
            messageEl.textContent = "";

            const formData = new FormData(event.target);
            const body = {
              username: String(formData.get("username") || "").trim(),
              password: String(formData.get("password") || ""),
              rememberMe: formData.get("rememberMe") === "on",
            };

            try {
              const response = await fetch("/auth/password-auth", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify(body),
              });

              const data = await response.json().catch(() => ({}));
              if (!response.ok || !data.accessToken) {
                throw new Error(data.message || "Đăng nhập thất bại");
              }

              window.location.href = buildCallbackUrl({
                accessToken: data.accessToken,
                refreshToken: data.refreshToken || "",
                userRole: data.userRole || "",
                state,
              });
            } catch (error) {
              messageEl.textContent = error.message || "Có lỗi xảy ra";
            }
          });
      })();
    </script>
  </body>
</html>
