server:
  port: 0

spring:
  datasource:
    url: jdbc:h2:mem:auth_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  cloud:
    discovery:
      enabled: false

eureka:
  client:
    enabled: false

jwt:
  private-key-path: classpath:rsa/privateKey.rsa
  public-key-path: classpath:rsa/publicKey.rsa
  access-token-expiration-ms: 900000
  refresh-token-expiration-ms: 604800000

logging:
  level:
    com.badmintion.authservice: DEBUG
